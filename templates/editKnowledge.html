{% extends "base.html" %} {% block content %}
<div class="errormessage d-flex justify-content-center">
  {% if errormessage != "" %}
  <div class="alert alert-danger w-50 mb-4" role="alert">
    {{ errormessage }}
  </div>
  {% else %} {% endif %}
</div>
<div class="container d-flex justify-content-center">
  <form class="form w-75" action="{{ url_for('editKnowledge',knowledge_id = knowledge.knowledge_id) }}" method="POST">
    <label class="form-label" for="">チャンネル</label>
    <select class="form-select" name="channel_id">
      <option value="{{ knowledge.channel_id }}">
        {{ knowledge.channel.channel_name }}
      </option>
      {% for channel in channels %}
       {% if knowledge.channel_id !=channel.channel_id %}
      <option value="{{ channel.channel_id }}">
        {{ channel.channel_name }}
      </option>
      {% endif %} {% endfor %}
    </select>
    <label class="form-label" for="">ナレッジ</label>
    <textarea
      class="form form-control mb-3"
      name="knowledge"
      style="height: 250px"
      required
    >
{{ knowledge.knowledge }}</textarea
    >
    <input class="btn btn-secondary" type="reset" value="リセット" />
    <input class="btn btn-primary" type="submit" value="更新" />
    <a href="{{ url_for('deleteKnowledge',channel_id = knowledge.channel_id,knowledge_id=knowledge.knowledge_id)}}" onclick="return btnDelete()" class="btn btn-danger">削除</a>
  </form>
</div>
{% endblock %}
