{% extends "base.html" %} {% block content %}
<div class="errormessage d-flex justify-content-center">
  {% if errormessage != "" %}
  <div class="alert alert-danger w-50 mb-4" role="alert">
    {{ errormessage }}
  </div>
  {% else %} {% endif %}
</div>
<div class="container d-flex justify-content-center">
  <form class="form w-75" action="/createKnowledge" method="POST">
    <label class="form-label" for="">チャンネル</label>
    <select class="form-select" name="channel_id" >
      {% for channel in channels %}
      <option value="{{ channel.channel_id }}">
        {{ channel.channel_name }}
      </option>
      {% endfor %}
    </select>
    <label class="form-label" for="">ナレッジ</label>
    <textarea
      class="form form-control mb-3"
      name="knowledge" style="height:250px"
      required
    ></textarea>
    <input class="btn btn-primary" type="submit" value="追加" />
  </form>
</div>
{% endblock %}
