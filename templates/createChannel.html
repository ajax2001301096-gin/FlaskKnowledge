{% extends "base.html" %} {% block content %}
<div class="errormessage d-flex justify-content-center">
  {% if errormessage != "" %}
  <div class="alert alert-danger w-50 mb-4" role="alert">
    {{ errormessage }}
  </div>
  {% else %} {% endif %}
</div>
<div class="container d-flex justify-content-center">
  <form class="form w-75" action="/createChannel" method="POST">
    <label class="form-label" for="">チャンネル</label>
    <input
      class="form form-control mb-3"
      type="text"
      name="channel_name"
      required
    />
    <label class="form-label" for="">概要</label>
    <textarea
      class="form form-control mb-3"
      name="overview"
      required
    ></textarea>
    <input class="btn btn-primary" type="submit" value="登録" />
  </form>
</div>
{% endblock %}
